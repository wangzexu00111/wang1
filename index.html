  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e1b4b, #3b064d);
      background-attachment: fixed;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    #particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .loader {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(129, 140, 248, 0.2);
      border-top-color: #818cf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .login {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.6s ease;
    }
    .login-box {
      background: rgba(30, 41, 59, 0.65);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 44px 32px;
      border-radius: 24px;
      width: 100%; max-width: 460px;
      box-shadow: 0 25px 70px rgba(0,0,0,0.4);
    }
    .title {
      text-align: center;
      font-size: 26px;
      margin-bottom: 32px;
      background: linear-gradient(90deg, #a78cf8, #60a5fa);
      -webkit-background-clip: text;
      color: transparent;
      font-weight: 600;
    }
    .tab {
      display: flex; gap: 12px; margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1; padding: 16px; border-radius: 14px; border: none;
      background: rgba(74,72,78,0.3); color: #d1d5db;
      transition: all 0.3s;
    }
    .tab-btn.active {
      background: linear-gradient(90deg, #7c3aed, #4f46e5); color: white;
    }
    .form { display: none; }
    .form.active { display: block; animation: fadeUp 0.4s ease; }
    .input-group { margin-bottom: 22px; }
    .input-group label {
      display: block; margin-bottom: 8px; font-size: 14px; color: #e5e7eb;
    }
    input {
      width: 100%; padding: 16px 18px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(15,23,42,0.5); color: white;
      outline: none; transition: 0.3s;
    }
    input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.25);
    }
    .code-box { display: flex; gap: 10px; }
    .code-btn {
      padding: 16px 18px; border-radius: 14px;
      background: linear-gradient(90deg, #7c3aed, #4f46e5);
      color: white; border: none; white-space: nowrap;
    }
    .code-btn:disabled { background: #475569; }
    .login-btn {
      width: 100%; padding: 18px; border-radius: 14px;
      background: linear-gradient(90deg, #7c3aed, #4f46e5);
      color: white; font-size: 16px; border: none;
      transition: 0.3s; margin-top: 10px;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(124,58,237,0.3);
    }
    .tips { text-align: center; margin-top: 18px; font-size: 13px; color: #9ca3af; }
    .success-tip { color: #4ade80; font-weight: 500; margin-top: 10px; text-align: center; }

    .main {
      display: none;
      width: 100%; max-width: 1200px;
      animation: fadeUp 0.6s ease;
      position: relative;
    }
    .main-title {
      text-align: center; font-size: 32px; margin: 10px 0 20px;
      background: linear-gradient(90deg, #a78cf8, #60a5fa);
      -webkit-background-clip: text; color: transparent;
    }
    .user-info {
      text-align: center; margin-bottom: 16px;
      font-size: 16px; color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .avatar-preview {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #818cf8;
    }
    .panel {
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;
    }
    .card {
      background: rgba(30,41,59,0.55); backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 24px; border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
      transition: 0.3s;
    }
    .card:hover { transform: translateY(-4px); }
    .card h3 { margin-bottom: 16px; font-size: 19px; color: #f3f4f6; }
    video, canvas {
      width: 100%; max-width: 400px; border-radius: 16px;
      background: #0f172a; border: 1px solid rgba(255,255,255,0.1);
    }
    .emotion { font-size: 17px; margin: 14px 0; color: #fbbf24; font-weight: 500; }
    
    button {

      margin-left: 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .favorite-btn.active {
      background: #ef4444;
    }

    .music-player {
      background: rgba(30,41,59,0.55); backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 28px; border-radius: 20px;

    .song-name { font-size: 18px; color: #fff; font-weight: 500; margin-bottom: 10px; }
    audio { width: 100%; border-radius: 12px; margin-bottom: 10px; }
    #visualizer {
      width: 100%; height: 70px;
      display: flex; align-items: flex-end;
      gap: 2px; padding: 8px 0;
    }
    .bar {
      flex: 1; background: #818cf8; border-radius: 2px;
      animation: upDown 0.3s ease infinite alternate;

    }
    @keyframes upDown {
      from { height: 4px; } to { height: 60px; }
    }
    .status { font-size: 14px; color: #9ca3af; }

    .playlist-container {

      color: #a78cf8;

    .song-item {

    }
    .song-item.active {

      top: 0;
      right: -450px;

      height: 100vh;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);

    }
    .user-center.show {

    }
    .user-center-header {

      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .user-center-header h2 {

    }
    .close-user-center {

    }

      flex-wrap: wrap;
      justify-content: center;

    }
    .avatar-option {

    }
    .avatar-option.active {

    }
    .section {

      margin-bottom: 10px;
      font-size: 18px;
    }

      .main-title { font-size: 26px; }

    }
  </style>
</head>

function initParticle() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  class Dot { constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.r = Math.random() * 1.5; this.sx = Math.random() * 0.5 - 0.25; this.sy = Math.random() * 0.5 - 0.25; } }
  let dots = Array.from({ length: 70 }, () => new Dot());
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    dots.forEach(d => { ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2); ctx.fillStyle = '#818cf840'; ctx.fill(); d.x += d.sx; d.y += d.sy; if (d.x < 0 || d.x > canvas.width) d.sx *= -1; if (d.y < 0 || d.y > canvas.height) d.sy *= -1; });
    requestAnimationFrame(draw);
  }
  draw();
}

function setAvatar(img) {

  refreshUserCenter();
}
function saveUserName() {

  if (val) { userData.name = val; saveUserData(); refreshUserCenter(); }

function saveUserData() { localStorage.setItem("userData", JSON.stringify(userData)); }
function refreshUserCenter() {
  document.getElementById("userAvatarBig").src = userData.avatar;
  document.getElementById("userNameShow").textContent = userData.name;
  document.getElementById("topAvatar").src = userData.avatar;
  document.getElementById("topName").textContent = userData.name;
  document.querySelectorAll(".avatar-option").forEach(i => {
    i.classList.toggle("active", i.src === userData.avatar);
  });
  document.getElementById("historyList").innerHTML = userData.history.map((s,i)=>`<div class="song-item" onclick="playFavorite(${i})">${i+1}. ${s.name}</div>`).join("");
  document.getElementById("favoriteList").innerHTML = userData.favorites.map((s,i)=>`<div class="song-item" onclick="playFavorite(${i},true)">${i+1}. ${s.name}</div>`).join("");
}

function addToHistory(song) {
  if(!userData.history.some(s=>s.name===song.name)) {
    userData.history.unshift(song);
    if(userData.history.length>20) userData.history=userData.history.slice(0,20);
    saveUserData();
  }
}
function toggleFavorite() {
  if(!currentSong) return;
  const i=userData.favorites.findIndex(s=>s.name===currentSong.name);
  if(i===-1) { userData.favorites.unshift(currentSong); } else { userData.favorites.splice(i,1); }
  saveUserData();
  refreshUserCenter();
  updateFavBtn();
}
function updateFavBtn() {
  const faved=currentSong && userData.favorites.some(s=>s.name===currentSong.name);
  document.getElementById("favoriteBtn").classList.toggle("active",faved);
}
function playFavorite(i,isFav=false){
  const song=isFav?userData.favorites[i]:userData.history[i];
  currentSong=song;
  audioEl.src=song.url;
  audioEl.play().catch(err=>console.log(err));
  document.getElementById("songName").textContent=`歌曲名：${song.name}`;
  updateFavBtn();
  closeUserCenter();
}

function switchTab(n){
  document.querySelectorAll('.form').forEach(f=>f.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('form'+n).classList.add('active');
  document.querySelectorAll('.tab-btn')[n-1].classList.add('active');
}
function getCode(){
  const phone=document.getElementById('phone').value;
  if(!phone||phone.length<11){alert("手机号不正确");return;}
  const btn=document.getElementById('codeBtn');
  btn.disabled=true;
  let t=60;
  codeTimer=setInterval(()=>{
    t--; btn.textContent=t+"秒重发";
    if(t<=0){clearInterval(codeTimer);btn.disabled=false;btn.textContent="获取验证码";}
  },1000);
  alert("验证码：1234");
}
function login1(){
  const name=document.getElementById('name').value.trim();
  const sid=document.getElementById('stuId').value.trim();
  if(!name||!sid||!validStudents[sid]||validStudents[sid]!==name){
    document.getElementById('loginFeedback').textContent="信息不正确";
    document.getElementById('loginFeedback').style.color="#f87171";
    document.getElementById('loginFeedback').style.display="block";
    return;
  }
  currentUser={name,id:sid};
  goMain();
}
function login2(){
  if(document.getElementById('code').value!=="1234"){alert("验证码错误");return;}
  currentUser={name:"访客",id:"guest"};
  goMain();
}
function goMain(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('mainPage').style.display='block';
  initSystem();
}
function logout(){location.reload();}

async function toggleCamera(){
  const btn=document.getElementById('camBtn');
  const txt=document.getElementById('faceEmotion');
  if(!isCameraOn){
    try{
      btn.disabled=true;
      const stream=await navigator.mediaDevices.getUserMedia({video:true});
      cameraStream=stream;
      videoEl.srcObject=stream;
      videoEl.onloadedmetadata=()=>{videoEl.play();faceapi.matchDimensions(canvasEl,videoEl);startFaceDetection();};
      isCameraOn=true;
      btn.textContent="关闭摄像头";
      btn.classList.add("stop");
    }catch(e){alert("请允许摄像头权限");}
    finally{btn.disabled=false;}
  }else{
    cameraStream?.getTracks().forEach(t=>t.stop());
    videoEl.srcObject=null;
    isCameraOn=false;
    btn.textContent="开启摄像头";
    btn.classList.remove("stop");
    txt.textContent="摄像头已关闭";
  }
}

async function toggleMicrophone(){
  const btn=document.getElementById('micBtn');
  const txt=document.getElementById('voiceEmotion');
  if(!isMicOn){
    try{
      btn.disabled=true;
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      micStream=stream;
      isMicOn=true;
      btn.textContent="关闭麦克风";
      btn.classList.add("stop");
      txt.textContent="麦克风已开启";
      startVoiceDetection();
    }catch(e){alert("请允许麦克风权限");}
    finally{btn.disabled=false;}
  }else{
    micStream?.getTracks().forEach(t=>t.stop());
    isMicOn=false;
    btn.textContent="开启麦克风";
    btn.classList.remove("stop");
    txt.textContent="麦克风已关闭";
  }
}

async function loadModels(){
  document.getElementById('status').textContent="加载AI模型...";
  const uri="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/";
  await faceapi.loadSsdMobilenetv1Model(uri);
  await faceapi.loadFaceLandmarkModel(uri);
  await faceapi.loadFaceExpressionModel(uri);
  isModelLoaded=true;
  document.getElementById('status').textContent="AI模型加载完成";
}

function startFaceDetection(){
  async function detect(){
    if(!isCameraOn||!videoEl.videoWidth){requestAnimationFrame(detect);return;}
    const r=await faceapi.detectSingleFace(videoEl).withFaceExpressions();
    if(r){
      const top=Object.entries(r.expressions).sort((a,b)=>b[1]-a[1])[0][0];
      document.getElementById('faceEmotion').textContent="面部情绪："+getEmotionText(top);
      updateEmotion(top);
    }
    requestAnimationFrame(detect);
  }
  detect();
}

function startVoiceDetection(){
  if(!audioContext)audioContext=new (window.AudioContext||window.webkitAudioContext)();
  const a=audioContext.createAnalyser();
  audioContext.createMediaStreamSource(micStream).connect(a);
  a.fftSize=256;
  const d=new Uint8Array(a.frequencyBinCount);
  function check(){
    if(!isMicOn)return;
    a.getByteFrequencyData(d);
    const avg=d.reduce((s,b)=>s+b,0)/d.length;
    let e="neutral";
    if(avg>60)e="angry";else if(avg>40)e="happy";else if(avg<15)e="sad";
    document.getElementById('voiceEmotion').textContent="语音情绪："+getEmotionText(e);
    updateEmotion(e);
    requestAnimationFrame(check);
  }
  check();
}

function getEmotionText(e){
  return{happy:"开心",sad:"悲伤",neutral:"平静",angry:"愤怒",fearful:"恐惧",disgusted:"厌恶",surprised:"惊讶"}[e]||"未知";
}

function updateEmotion(emo){
  if(lastEmotion===emo)return;
  lastEmotion=emo;
  const list=[...songLibrary[emo]||songLibrary.neutral];
  list.sort((a,b)=>a.name.localeCompare(b.name,'zh-CN'));
  currentPlaylist=list;
  currentSongIndex=0;
  renderPlaylist(emo);
  playSong(0);
}

function renderPlaylist(emo){
  const c=document.getElementById('playlistItems');
  document.getElementById('playlistTitle').textContent=`歌单：${getEmotionText(emo)}`;
  c.innerHTML=currentPlaylist.map((s,i)=>`<div class="song-item" onclick="playSong(${i})">${i+1}. ${s.name}</div>`).join("");
}

function playSong(idx){
  if(!currentPlaylist.length)return;
  currentSongIndex=idx;
  const song=currentPlaylist[idx];
  currentSong=song;
  audioEl.src=song.url;
  audioEl.play().catch(err=>console.log("播放需要用户交互",err));
  addToHistory(song);
  document.getElementById('songName').textContent=`歌曲名：${song.name}`;
  document.getElementById('musicInfo').textContent=`情绪：${getEmotionText(lastEmotion)}`;
  document.getElementById('status').textContent=`正在播放：${song.name}`;
  updateFavBtn();
  document.querySelectorAll('.song-item').forEach((el,i)=>el.classList.toggle('active',i===idx));
}

function initSystem(){
  loadModels();
  updateEmotion("neutral");
}
</script>
